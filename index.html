<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS — E-commerce</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap iconos -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Mi Css  -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- HEADER / NAV  -->
    <header class="app-header sticky-top">
      <nav
        class="navbar navbar-expand-lg"
        aria-label="Barra de navegación principal"
      >
        <div class="container">
          <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-bag-heart-fill"></i> TiendaJS
          </a>

          <!-- Botón hamburgue -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navContent"
            aria-controls="navContent"
            aria-expanded="false"
            aria-label="Abrir menú de navegación"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navContent">
            <!-- Buscador -->
            <form
              class="search-form ms-lg-auto my-2 my-lg-0"
              role="search"
              id="search-form"
            >
              <label for="search-input" class="visually-hidden"
                >Buscar productos</label
              >
              <div class="input-group">
                <span class="input-group-text" aria-hidden="true">
                  <i class="bi bi-search"></i>
                </span>
                <input
                  id="search-input"
                  type="search"
                  class="form-control"
                  placeholder="Buscar productos…"
                  autocomplete="off"
                />
              </div>
            </form>

            <!-- carrito con badge -->
            <button
              type="button"
              class="btn btn-cart ms-lg-3 position-relative"
              id="open-cart-btn"
              aria-label="Abrir carrito de compras"
            >
              <i class="bi bi-cart3"></i>
              <span
                id="cart-badge"
                class="badge rounded-pill cart-badge d-none"
                aria-live="polite"
                >0</span
              >
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-4">
      <!-- Filtro de catego -->
      <section aria-label="Filtro de categorías" class="mb-4">
        <div
          id="category-bar"
          class="category-bar d-flex flex-wrap gap-2"
        ></div>
      </section>

      <!-- Lista de productos -->
      <section aria-label="Listado de productos">
        <!-- Estado de carga -->
        <div id="loading" class="text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando…</span>
          </div>
          <p class="mt-2 text-muted">Cargando productos…</p>
        </div>

        <div id="empty-state" class="text-center py-5 d-none">
          <i class="bi bi-search display-4 text-muted"></i>
          <p class="mt-2 text-muted">
            No encontramos productos con ese criterio.
          </p>
        </div>

        <!-- las cards -->
        <div
          id="product-grid"
          class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4"
        ></div>
      </section>
    </main>

    <footer class="app-footer mt-auto py-4">
      <div class="container text-center">
        <p class="mb-0">
          TiendaJS · Laboratorio de aplicaciones web cliente · ISTEA
        </p>
      </div>
    </footer>

    <!-- Modal de producto-->

    <div
      class="modal fade"
      id="product-modal"
      tabindex="-1"
      aria-labelledby="product-modal-title"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title h5" id="product-modal-title">
              Detalle del producto
            </h2>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body" id="product-modal-body"></div>
        </div>
      </div>
    </div>

    <!-- carrito y sidebar-->

    <aside
      class="offcanvas offcanvas-end"
      tabindex="-1"
      id="cart-offcanvas"
      aria-labelledby="cart-offcanvas-title"
    >
      <div class="offcanvas-header">
        <h2 class="offcanvas-title h5" id="cart-offcanvas-title">
          <i class="bi bi-cart3"></i> Tu carrito
        </h2>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Cerrar carrito"
        ></button>
      </div>

      <div class="offcanvas-body d-flex flex-column">
        <!-- carrito vacio -->
        <div id="cart-empty" class="text-center my-auto text-muted">
          <i class="bi bi-cart-x display-4"></i>
          <p class="mt-2">Tu carrito está vacío.</p>
        </div>

        <!-- Lista de items -->
        <ul
          id="cart-items"
          class="list-unstyled flex-grow-1 overflow-auto mb-0"
        ></ul>

        <!-- carrito total ,agragar o quitar -->
        <div id="cart-footer" class="cart-footer pt-3 d-none">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="fw-semibold">Total</span>
            <span class="fs-4 fw-bold" id="cart-total">$0,00</span>
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-primary" id="checkout-btn">
              <i class="bi bi-check2-circle"></i> Finalizar compra
            </button>
            <button class="btn btn-outline-danger" id="clear-cart-btn">
              <i class="bi bi-trash3"></i> Vaciar carrito
            </button>
          </div>
        </div>
      </div>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
